<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iniciar sesión — Quiroinfo</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

	<div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8">

		<h1 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar sesión</h1>

		{% if error %}
		<div class="mb-4 rounded-lg bg-red-50 border border-red-300 px-4 py-3 text-sm text-red-700">
			{{ error }}
		</div>
		{% endif %}

		<form method="post" action="">
			{% csrf_token %}

			<div class="mb-4">
				<label for="email" class="block text-sm font-medium text-gray-700 mb-1">
					Correo electrónico
				</label>
				<input
					type="email"
					id="email"
					name="email"
					placeholder="usuario@hospital.cl"
					required
					class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
				>
			</div>

			<button
				type="submit"
				class="w-full rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 text-sm transition-colors"
			>
				Entrar
			</button>

		</form>

	</div>

</body>
</html>
