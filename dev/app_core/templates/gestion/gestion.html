<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Panel de Gestión — Quiroinfo</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
	<script src="https://unpkg.com/htmx.org@1.9.12"></script>
	<meta name="htmx-config" content='{"defaultSwapStyle":"outerHTML"}'>
	<style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen bg-gray-100">

	<header class="bg-white shadow-sm px-6 py-3 flex items-center justify-between">
		<h1 class="text-xl font-bold text-gray-800">Panel de Gestión</h1>
		<form method="post" action="{% url 'logout' %}">
			{% csrf_token %}
			<button type="submit" class="text-sm text-gray-500 hover:text-red-600 transition-colors">
				Cerrar sesión
			</button>
		</form>
	</header>

	{% comment %}Token CSRF disponible para HTMX via header{% endcomment %}
	<script>
		document.addEventListener ('htmx:configRequest', function (evt) {
			evt.detail.headers ['X-CSRFToken'] = '{{ csrf_token }}';
		});
	</script>

	<main class="p-6">
		{% include "gestion/fragmento_tablas.html" %}
	</main>

</body>
</html>
