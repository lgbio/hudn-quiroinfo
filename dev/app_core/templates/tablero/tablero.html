<!DOCTYPE html>
<html lang="es" x-data="{ sinConexion: false }" @htmx:send-error.window="sinConexion = true" @htmx:after-request.window="sinConexion = false">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tablero Quirúrgico</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
	<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

	<header class="bg-gray-800 px-8 py-4 flex items-center justify-between">
		<h1 class="text-4xl font-bold tracking-wide">Seguimiento Quirúrgico</h1>
		<div x-show="sinConexion" class="flex items-center gap-2 bg-red-600 text-white px-4 py-2 rounded-lg text-2xl font-semibold">
			<span>⚠</span>
			<span>Sin conexión</span>
		</div>
	</header>

	<main class="flex-1 p-8">
		<div
			id="lista-sesiones"
			hx-get="/tablero/fragmento/"
			hx-trigger="every 15s"
			hx-swap="innerHTML"
		>
			{% include "tablero/fragmento.html" %}
		</div>
	</main>

</body>
</html>
