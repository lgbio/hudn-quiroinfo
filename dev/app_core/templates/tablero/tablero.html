<!DOCTYPE html>
<html lang="es" x-data="{ sinConexion: false }" @htmx:send-error.window="sinConexion = true" @htmx:after-request.window="sinConexion = false">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tablero Quirúrgico</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
	<script src="https://unpkg.com/htmx.org@1.9.12"></script>
	<style>
		*, *::before, *::after { box-sizing: border-box; }

		html, body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: #111827; /* gray-900 */
			color: white;
		}

		body {
			display: flex;
			flex-direction: column;
		}

		/* Header: fixed small slice of viewport */
		#tablero-header {
			flex: 0 0 auto;
			background: #1f2937; /* gray-800 */
			padding: 1vh 3vw;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-bottom: 2px solid #374151; /* gray-700 */
		}

		#tablero-header h1 {
			font-size: clamp(1.2rem, 3vh, 3.5rem);
			font-weight: 700;
			letter-spacing: 0.05em;
			margin: 0;
		}

		.alerta-conexion {
			display: flex;
			align-items: center;
			gap: 0.5em;
			background: #dc2626;
			padding: 0.4em 1em;
			border-radius: 0.5em;
			font-size: clamp(0.9rem, 2vh, 2rem);
			font-weight: 600;
		}

		/* Main: takes all remaining height */
		#tablero-main {
			flex: 1 1 0;
			min-height: 0;
			display: flex;
			flex-direction: column;
			padding: 1vh 2vw;
		}

		/* HTMX swap target: must also fill height */
		#lista-sesiones {
			flex: 1 1 0;
			min-height: 0;
			display: flex;
			flex-direction: column;
		}
	</style>
</head>
<body>

	<header id="tablero-header">
		<h1>Seguimiento Quirúrgico</h1>
		<div x-show="sinConexion" x-cloak class="alerta-conexion">
			<span>⚠</span>
			<span>Sin conexión</span>
		</div>
	</header>

	<main id="tablero-main">
		<div
			id="lista-sesiones"
			hx-get="/tablero/fragmento/"
			hx-trigger="every 15s"
			hx-swap="innerHTML"
		>
			{% include "tablero/fragmento.html" %}
		</div>
	</main>

</body>
</html>
